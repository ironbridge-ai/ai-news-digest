<script>
(function() {
  var NODES = [{"label": "LLM", "definition": "Large Language Model. An AI trained on vast amounts of text that can understand and generate human language. Think of it as an extremely well-read assistant that has absorbed billions of documents and can write, summarise, answer questions, and hold a conversation.", "category": "foundation", "from_log": false, "battlecards": [{"name": "OpenAI", "id": "openai"}, {"name": "xAI", "id": "xai"}, {"name": "Meta AI", "id": "meta"}]}, {"label": "Transformer", "definition": "The architecture that powers most modern AI models. Invented by Google in 2017, it lets AI process entire paragraphs at once and understand how words relate to each other, rather than reading one word at a time. It is the engine inside GPT, Claude, Gemini, and nearly every other AI you use today.", "category": "foundation", "from_log": false, "battlecards": []}, {"label": "Neural Network", "definition": "The basic building block of modern AI. Loosely inspired by the human brain, it is a layered system that learns patterns by adjusting millions of tiny connections based on examples. Train it on enough data and it learns to recognise faces, translate languages, or generate code.", "category": "foundation", "from_log": false, "battlecards": []}, {"label": "Context Window", "definition": "The maximum amount of text an AI can see and work with at one time. Think of it like the AI's short-term memory. A small context window limits the AI to a few pages; a large one can handle an entire book. Bigger context windows mean the AI can work on longer, more complex tasks.", "category": "deployment", "from_log": false, "battlecards": [{"name": "Anthropic", "id": "anthropic"}]}, {"label": "RAG", "definition": "Retrieval-Augmented Generation. A technique where an AI first searches a database of documents to find relevant information, then writes its answer based on what it found. This stops the AI from making things up and keeps answers grounded in your actual company data.", "category": "deployment", "from_log": false, "battlecards": [{"name": "Google / DeepMind", "id": "google"}]}, {"label": "Hallucination", "definition": "When an AI confidently states something that is factually wrong. Like a student who does not know the answer but writes something plausible-sounding anyway. Hallucination is one of the main risks of using AI output without human review.", "category": "safety", "from_log": false, "battlecards": []}, {"label": "RLHF", "definition": "Reinforcement Learning from Human Feedback. A training method where humans rate the AI's responses as good or bad, and the AI learns to produce more of what got positive ratings. This is how ChatGPT and Claude became helpful and conversational.", "category": "safety", "from_log": false, "battlecards": [{"name": "Anthropic", "id": "anthropic"}]}, {"label": "Multimodal", "definition": "An AI that can work with more than one type of input or output \u2014 text, images, audio, and video. A multimodal model can describe a photograph, read a chart, listen to a voice recording, or analyse a document without switching tools.", "category": "generation", "from_log": false, "battlecards": [{"name": "OpenAI", "id": "openai"}, {"name": "Google / DeepMind", "id": "google"}, {"name": "xAI", "id": "xai"}]}, {"label": "Agentic workflow", "definition": "A process where an AI takes a series of actions over time to complete a goal, rather than just answering a single question. An AI told to book a meeting might check calendars, draft an email, send it, and update a spreadsheet \u2014 all in sequence without human prompting at each step.", "category": "deployment", "from_log": false, "battlecards": [{"name": "OpenAI", "id": "openai"}, {"name": "Microsoft", "id": "microsoft"}]}, {"label": "Alignment", "definition": "The challenge of making AI systems do what humans actually want, safely and reliably. An aligned AI follows instructions without harmful side effects, respects rules, and does not pursue goals that conflict with human values. It is the difference between a helpful assistant and an unpredictable one.", "category": "safety", "from_log": false, "battlecards": [{"name": "Anthropic", "id": "anthropic"}]}, {"label": "Autoregressive model", "definition": "An AI that generates text one word at a time, where each word is predicted based on everything that came before it. This is how GPT models work. It is like autocomplete on your phone, but applied thousands of times in sequence at extraordinary speed.", "category": "generation", "from_log": false, "battlecards": [{"name": "OpenAI", "id": "openai"}]}, {"label": "AI agent", "definition": "A piece of AI software that can carry out multi-step tasks on its own without a human guiding every click. Unlike a chatbot that just answers questions, an agent can take actions: send emails, look up records, process refunds, or schedule meetings. Think of it as a digital employee that follows instructions and gets things done independently.", "category": "deployment", "from_log": true, "battlecards": [{"name": "Anthropic", "id": "anthropic"}]}, {"label": "Data isolation", "definition": "The principle that different users' information should be kept completely separate within a system, so one person's data can never accidentally appear in another person's results. Like having separate locked filing cabinets rather than one shared drawer. AI models struggle with this because they process everything through the same underlying system.", "category": "safety", "from_log": true, "battlecards": [{"name": "Microsoft", "id": "microsoft"}]}, {"label": "prompt injection", "definition": "A type of attack where someone hides instructions inside text that an AI reads, tricking it into doing something it was not supposed to do. Think of it like slipping a forged note into a stack of legitimate paperwork so the person processing it follows the fake instructions without realising.", "category": "safety", "from_log": true, "battlecards": [{"name": "Microsoft", "id": "microsoft"}]}, {"label": "multi-agent interaction", "definition": "When multiple AI agents, each built by different companies or teams with different goals, communicate and transact with each other without a human in the middle. Imagine hundreds of personal assistants from different households all trying to book the same restaurant at once, each following their own boss's instructions but creating chaos together.", "category": "deployment", "from_log": true, "battlecards": []}, {"label": "emergent behaviour", "definition": "When a system does something that nobody explicitly programmed it to do, simply because of how its individual parts interact. Like how a traffic jam appears even though no single driver decided to create one. In AI, it means agents or models producing unexpected results that arise from scale and complexity rather than design.", "category": "safety", "from_log": true, "battlecards": []}, {"label": "frontier model", "definition": "The most advanced AI model available at any given time, pushing the boundary of what AI can do. It is the cutting edge, the model that defines the current limit of AI capability before the next breakthrough moves the line forward again.", "category": "foundation", "from_log": true, "battlecards": [{"name": "Anthropic", "id": "anthropic"}, {"name": "OpenAI", "id": "openai"}, {"name": "Google / DeepMind", "id": "google"}, {"name": "xAI", "id": "xai"}, {"name": "Meta AI", "id": "meta"}]}, {"label": "token consumption", "definition": "A measure of how much AI processing you use. AI models break text into small pieces called tokens, roughly one token per word. Every question you ask and answer you receive costs tokens. Token consumption is like a meter running on your AI usage, and it determines your bill under usage-based pricing.", "category": "business", "from_log": true, "battlecards": []}, {"label": "SearchLeak", "definition": "The name given to a specific security flaw in Microsoft Copilot that allowed attackers to trick the AI assistant into revealing sensitive information like login codes. Think of it like a con artist asking a helpful receptionist just the right question to get them to hand over confidential files without realising.", "category": "safety", "from_log": true, "battlecards": []}, {"label": "multi-model architectures", "definition": "Instead of using one single AI brain for everything, a system uses different AI models for different tasks, like having a specialist doctor for complex problems and a GP for routine questions. This lets companies balance quality and cost by routing simple tasks to cheaper models and hard tasks to expensive ones.", "category": "business", "from_log": true, "battlecards": [{"name": "Microsoft", "id": "microsoft"}]}, {"label": "diffusion-based generation", "definition": "A technique where AI creates output by starting with random noise and gradually refining it into a finished result, like a sculptor revealing a statue from a block of marble. Instead of building an answer one word at a time, the AI generates everything at once and sharpens it in a few quick passes. This makes output dramatically faster.", "category": "generation", "from_log": true, "battlecards": [{"name": "Google / DeepMind", "id": "google"}]}, {"label": "search-grounding", "definition": "When an AI assistant looks through your actual files, emails, and documents to base its answers on real information rather than just its general training knowledge. It is what makes Copilot useful for work, because it answers questions about your specific data rather than giving generic responses.", "category": "deployment", "from_log": true, "battlecards": [{"name": "Microsoft", "id": "microsoft"}, {"name": "Google / DeepMind", "id": "google"}]}, {"label": "open-weight model", "definition": "An AI model where the creator publishes the inner workings so anyone can download and run it on their own computers. Think of it like a recipe being made public: you can cook the dish yourself in your own kitchen instead of only buying it at the restaurant.", "category": "foundation", "from_log": true, "battlecards": [{"name": "xAI", "id": "xai"}, {"name": "Meta AI", "id": "meta"}]}, {"label": "DiffusionGemma", "definition": "A specific AI model from Google DeepMind that generates text using a technique borrowed from image creation. Instead of writing one word at a time like traditional AI, it refines the entire answer all at once, like developing a photograph. The result is text produced four times faster than normal.", "category": "generation", "from_log": true, "battlecards": []}, {"label": "AI agent governance", "definition": "The rules and monitoring a business puts in place to control what its AI agents are allowed to do on their own. It answers questions like: can this agent spend money, send emails, or share data without a human approving first? Think of it as setting boundaries for a new employee who works at superhuman speed.", "category": "business", "from_log": true, "battlecards": []}, {"label": "model diversification", "definition": "The practice of using multiple AI models from different providers rather than relying on a single one. It is like buying insurance from several companies instead of one. If one model goes down, gets too expensive, or gets banned, your business keeps running on the others.", "category": "business", "from_log": true, "battlecards": [{"name": "Meta AI", "id": "meta"}]}, {"label": "Record and Replay", "definition": "A feature where AI watches you perform a task on your computer once, learns the steps, and then repeats that exact task on its own whenever you ask. Think of it as showing a new employee how to do something once, except the employee has perfect memory and never gets bored.", "category": "deployment", "from_log": true, "battlecards": []}];
  var EDGES = [[0, 1], [0, 16], [0, 3], [0, 5], [0, 19], [0, 10], [1, 20], [1, 10], [11, 8], [11, 14], [11, 24], [11, 26], [13, 18], [13, 12], [13, 5], [21, 18], [21, 4], [4, 3], [25, 19], [25, 22], [20, 23], [14, 15], [14, 24], [16, 22], [17, 3], [6, 9], [6, 16], [7, 20], [8, 24], [2, 1], [2, 0]];
  var CAT_COLORS = {"foundation": "#10131b", "generation": "#bf5631", "deployment": "#41407c", "safety": "#c2922f", "business": "#7d8aa0"};
  var SEARCH_URL = "https://dev-rvelasquez.tailc35de4.ts.net";

  var svg = document.getElementById('graph-svg');
  var W, H;
  var simNodes = [], simEdges = [];
  var dragging = null, dragOffX = 0, dragOffY = 0;
  var activeIdx = -1;
  var filterCat = null;
  var searchQuery = '';

  function resize() {
    W = svg.clientWidth; H = svg.clientHeight;
  }

  function initNodes() {
    var n = NODES.length;
    simNodes = NODES.map(function(nd, i) {
      var angle = (2 * Math.PI * i / n) - Math.PI / 2;
      var r = Math.min(W, H) * 0.42;
      return { x: W/2 + r * Math.cos(angle), y: H/2 + r * Math.sin(angle),
               vx: 0, vy: 0, data: nd, idx: i };
    });
    simEdges = EDGES.map(function(e) { return { s: e[0], t: e[1] }; });
  }

  var REPULSION = 7000, SPRING_LEN = 175, SPRING_K = 0.035;
  var DAMPING = 0.84, GRAVITY = 0.013;

  function tick() {
    var cx = W/2, cy = H/2;
    for (var i = 0; i < simNodes.length; i++) {
      for (var j = i+1; j < simNodes.length; j++) {
        var a = simNodes[i], b = simNodes[j];
        var dx = b.x - a.x, dy = b.y - a.y;
        var dist = Math.sqrt(dx*dx + dy*dy) || 1;
        var f = REPULSION / (dist * dist);
        var fx = f * dx/dist, fy = f * dy/dist;
        a.vx -= fx; a.vy -= fy;
        b.vx += fx; b.vy += fy;
      }
    }
    for (var k = 0; k < simEdges.length; k++) {
      var e = simEdges[k];
      var a = simNodes[e.s], b = simNodes[e.t];
      var dx = b.x - a.x, dy = b.y - a.y;
      var dist = Math.sqrt(dx*dx + dy*dy) || 1;
      var f = SPRING_K * (dist - SPRING_LEN);
      var fx = f * dx/dist, fy = f * dy/dist;
      a.vx += fx; a.vy += fy;
      b.vx -= fx; b.vy -= fy;
    }
    for (var i = 0; i < simNodes.length; i++) {
      var n = simNodes[i];
      if (n === dragging) continue;
      n.vx += (cx - n.x) * GRAVITY;
      n.vy += (cy - n.y) * GRAVITY;
      n.vx *= DAMPING; n.vy *= DAMPING;
      n.x += n.vx; n.y += n.vy;
      n.x = Math.max(50, Math.min(W - 50, n.x));
      n.y = Math.max(50, Math.min(H - 50, n.y));
    }
    render();
    requestAnimationFrame(tick);
  }

  function nodeVisible(n) {
    var nd = n.data;
    if (filterCat && nd.category !== filterCat) return false;
    if (searchQuery) {
      var q = searchQuery.toLowerCase();

    }
    return true;
  }

  function render() {
    svg.innerHTML = '';

    var filter = document.createElementNS('http://www.w3.org/2000/svg', 'filter');

    var feGaussianBlur = document.createElementNS('http://www.w3.org/2000/svg', 'feGaussianBlur');
    feGaussianBlur.setAttribute('stdDeviation', '3'); feGaussianBlur.setAttribute('result', 'coloredBlur');

    var feMergeNode1 = document.createElementNS('http://www.w3.org/2000/svg', 'feMergeNode');
    feMergeNode1.setAttribute('in', 'coloredBlur');
    var feMergeNode2 = document.createElementNS('http://www.w3.org/2000/svg', 'feMergeNode');
    feMergeNode2.setAttribute('in', 'SourceGraphic');
    feMerge.appendChild(feMergeNode1); feMerge.appendChild(feMergeNode2);
    filter.appendChild(feGaussianBlur); filter.appendChild(feMerge);
    defs.appendChild(filter); svg.appendChild(defs);

    // Draw edges
    for (var k = 0; k < simEdges.length; k++) {
      var e = simEdges[k];
      var a = simNodes[e.s], b = simNodes[e.t];
      if (!nodeVisible(a) || !nodeVisible(b)) continue;
      var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      var isActive = (activeIdx === e.s || activeIdx === e.t);
      line.setAttribute('x1', a.x); line.setAttribute('y1', a.y);
      line.setAttribute('x2', b.x); line.setAttribute('y2', b.y);
      line.setAttribute('stroke', isActive ? '#bf5631' : '#e6dcc4');
      line.setAttribute('stroke-width', isActive ? '2' : '1');
      line.setAttribute('opacity', isActive ? '0.8' : '0.5');
      svg.appendChild(line);
    }

    // Draw nodes
    for (var i = 0; i < simNodes.length; i++) {
      var n = simNodes[i]; var nd = n.data;
      var visible = nodeVisible(n);
      var isActive = (activeIdx === i);
      var color = CAT_COLORS[nd.category] || '#888';
      var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('transform', 'translate(' + n.x + ',' + n.y + ')');
      g.setAttribute('data-idx', i);
      g.style.opacity = visible ? '1' : '0.15';
      g.style.cursor = 'pointer';

      var r = isActive ? 10 : 8;
      var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('r', r);
      circle.setAttribute('fill', color);
      circle.setAttribute('stroke', isActive ? '#10131b' : 'rgba(16,19,27,0.22)');
      circle.setAttribute('stroke-width', isActive ? '2.5' : '1.5');
      if (isActive) circle.setAttribute('filter', 'url(#glow)');

      var label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      var onRight = n.x > W * 0.58;
      label.setAttribute('x', onRight ? -(r + 6) : (r + 6));
      label.setAttribute('text-anchor', onRight ? 'end' : 'start');
      label.setAttribute('y', '5');
      label.setAttribute('font-size', isActive ? '13' : '12');
      label.setAttribute('font-weight', isActive ? '700' : '600');
      label.setAttribute('font-family', "'Install Rounded', 'Nunito', Geist, Arial, sans-serif");
      label.setAttribute('fill', isActive ? '#10131b' : '#444');
      label.setAttribute('stroke', '#f8f4e3');
      label.setAttribute('stroke-width', '3.5');
      label.setAttribute('paint-order', 'stroke');
      label.setAttribute('pointer-events', 'none');
      label.textContent = nd.label;

      var hitbox = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      hitbox.setAttribute('r', '20'); hitbox.setAttribute('fill', 'transparent');

      g.appendChild(circle); g.appendChild(label); g.appendChild(hitbox);
      svg.appendChild(g);
    }
  }

  function showDetail(idx) {
    activeIdx = idx;
    var nd = simNodes[idx].data;
    document.getElementById('detail-empty').style.display = 'none';
    var dc = document.getElementById('detail-content');
    dc.style.display = 'block';
    var catEl = document.getElementById('d-cat');
    catEl.textContent = nd.category;
    catEl.style.color = CAT_COLORS[nd.category] || '#bf5631';
    document.getElementById('d-term').textContent = nd.label;
    document.getElementById('d-def').textContent = nd.definition;

    var relWrap = document.getElementById('d-related-wrap');
    var relDiv = document.getElementById('d-related');
    relDiv.innerHTML = '';
    var neighbors = [];
    for (var k = 0; k < simEdges.length; k++) {
      var e = simEdges[k];
      if (e.s === idx) neighbors.push(e.t);
      else if (e.t === idx) neighbors.push(e.s);
    }
    if (neighbors.length > 0) {
      relWrap.style.display = 'block';
      neighbors.forEach(function(ni) {
        var chip = document.createElement('span');
        chip.className = 'related-chip';
        chip.textContent = simNodes[ni].data.label;
        chip.style.borderColor = CAT_COLORS[simNodes[ni].data.category] || '#e6dcc4';
        chip.addEventListener('click', function() { showDetail(ni); });
        relDiv.appendChild(chip);
      });
    } else {
      relWrap.style.display = 'none';
    }

    var bcWrap = document.getElementById('d-bc-wrap');
    var bcDiv = document.getElementById('d-bc');
    bcDiv.innerHTML = '';
    if (nd.battlecards && nd.battlecards.length > 0) {
      bcWrap.style.display = 'block';
      nd.battlecards.forEach(function(bc) {
        var a = document.createElement('a');
        a.className = 'bc-link';
        a.href = 'battlecards.html#bc-' + bc.id;
        a.innerHTML = bc.name + '<span class="bc-link-arrow">&#8599;</span>';
        bcDiv.appendChild(a);
      });
    } else {
      bcWrap.style.display = 'none';
    }
  }

  // Interaction
  svg.addEventListener('mousedown', function(e) {
    var g = e.target.closest('g[data-idx]');
    if (!g) return;
    var idx = parseInt(g.getAttribute('data-idx'));
    dragging = simNodes[idx];
    var rect = svg.getBoundingClientRect();
    dragOffX = e.clientX - rect.left - dragging.x;
    dragOffY = e.clientY - rect.top - dragging.y;
    dragging._startX = dragging.x; dragging._startY = dragging.y;
    e.preventDefault();
  });

  svg.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var rect = svg.getBoundingClientRect();
    dragging.x = e.clientX - rect.left - dragOffX;
    dragging.y = e.clientY - rect.top - dragOffY;
    dragging.vx = 0; dragging.vy = 0;
  });

  window.addEventListener('mouseup', function(e) {
    if (!dragging) return;
    var moved = Math.abs(dragging.x - dragging._startX) + Math.abs(dragging.y - dragging._startY);
    var idx = dragging.idx;
    dragging = null;
    if (moved < 5) showDetail(idx);
  });

  // Search
  var searchTimer;
  document.getElementById('search-input').addEventListener('input', function(e) {
    searchQuery = e.target.value.trim();
    clearTimeout(searchTimer);
    if (searchQuery.length >= 2) {
      searchTimer = setTimeout(function() {
        logSearch(searchQuery);
      }, 800);
    }
  });

  // Legend
  var CAT_DESC = {
    foundation: 'The core building blocks of AI',
    generation: 'How AI creates text, images & more',
    deployment: 'Putting AI to work on real tasks',
    safety:     'Risks, attacks & safeguards',
    business:   'Commercial & strategic ideas'
  };
  var CAT_NAMES = {
    foundation: 'Foundations', generation: 'Generation', deployment: 'Deployment',
    safety: 'Safety', business: 'Business'
  };
  var legendEl = document.getElementById('legend');
  Object.keys(CAT_COLORS).forEach(function(cat) {
    var item = document.createElement('div');
    item.className = 'legend-item';
    item.dataset.cat = cat;
    item.title = 'Click to show only ' + (CAT_NAMES[cat] || cat) + ' concepts';
    item.innerHTML = '<div class="legend-dot" style="background:' + CAT_COLORS[cat] + '"></div>' +
      '<div class="legend-text"><span class="legend-name">' + (CAT_NAMES[cat] || cat) + '</span>' +
      '<span class="legend-desc">' + (CAT_DESC[cat] || '') + '</span></div>';
    item.addEventListener('click', function() {
      filterCat = (filterCat === cat) ? null : cat;
      document.querySelectorAll('.legend-item').forEach(function(li) {
        li.style.opacity = (filterCat && li.dataset.cat !== filterCat) ? '0.3' : '1';
      });
    });
    legendEl.appendChild(item);
  });

  // Trending
  function logSearch(term) {
    var key = 'austen_searches';
    var arr = JSON.parse(localStorage.getItem(key) || '[]');
    arr.push({term: term.toLowerCase(), ts: Date.now()});
    if (arr.length > 200) arr = arr.slice(-200);
    localStorage.setItem(key, JSON.stringify(arr));
    if (SEARCH_URL) {
      fetch(SEARCH_URL + '/api/search', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({term: term, page: 'glossary', ts: Date.now()/1000})
      }).catch(function(){});
    }
  }

  function loadTrending() {
    function display(items) {
      var el = document.getElementById('trending-chips');
      el.innerHTML = '';
      items.slice(0, 6).forEach(function(item) {
        var chip = document.createElement('span');
        chip.className = 'trending-chip';
        chip.textContent = item.term;
        chip.addEventListener('click', function() {
          document.getElementById('search-input').value = item.term;
          searchQuery = item.term;
          var found = simNodes.find(function(n) {
            return n.data.label.toLowerCase() === item.term.toLowerCase();
          });
          if (found) showDetail(found.idx);
        });
        el.appendChild(chip);
      });
    }

    if (SEARCH_URL) {
      fetch(SEARCH_URL + '/api/trending').then(function(r) { return r.json(); })
        .then(function(d) { if (d.trending && d.trending.length) display(d.trending); else loadTrendingLocal(); })
        .catch(loadTrendingLocal);
    } else {
      loadTrendingLocal();
    }
  }

  function loadTrendingLocal() {
    var arr = JSON.parse(localStorage.getItem('austen_searches') || '[]');
    var cutoff = Date.now() - 7 * 86400000;
    var counts = {};
    arr.filter(function(s) { return s.ts >= cutoff; }).forEach(function(s) {
      counts[s.term] = (counts[s.term] || 0) + 1;
    });
    var sorted = Object.entries(counts).sort(function(a,b) { return b[1]-a[1]; });
    if (sorted.length) display(sorted.slice(0,6).map(function(e) { return {term:e[0], count:e[1]}; }));
  }

  // URL param: focus a specific node on load
  var params = new URLSearchParams(window.location.search);
  var focusTerm = params.get('focus');

  resize();
  window.addEventListener('resize', function() { resize(); });
  initNodes();
  loadTrending();
  requestAnimationFrame(tick);

  if (focusTerm) {
    setTimeout(function() {
      var found = simNodes.find(function(n) {
        return n.data.label.toLowerCase() === focusTerm.toLowerCase();
      });
      if (found) showDetail(found.idx);
    }, 400);
  }
})();
</script>
</body>
</html>
