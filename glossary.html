<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Glossary — Thought Provoked</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f8f4e3; font-family: Geist, Arial, sans-serif; color: #10131b; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  a { color: inherit; text-decoration: none; }
  
  .site-nav { background: #10131b; padding: 0 24px; display: flex; align-items: center; gap: 0; position: relative; z-index: 10; }
  .nav-brand { font-family: 'Install Rounded', 'Nunito', Geist, Arial, sans-serif; font-size: 16px; font-weight: 800; color: #ffffff; letter-spacing: -0.02em; padding: 14px 20px 14px 0; border-right: 1px solid rgba(255,255,255,0.1); margin-right: 4px; white-space: nowrap; }
  .nav-link { font-family: 'Install Rounded', 'Nunito', Geist, Arial, sans-serif; font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.6); padding: 14px 16px; text-transform: uppercase; letter-spacing: 0.08em; transition: color 0.15s; border-bottom: 3px solid transparent; margin-bottom: -3px; }
  .nav-link:hover { color: #fff; }
  .nav-link.active { color: #ffffff; border-bottom-color: #bf5631; }
  .nav-build { margin-left: auto; font-family: 'Install Rounded', 'Nunito', Geist, Arial, sans-serif; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.4); white-space: nowrap; }
  .austen-name { position: relative; color: rgba(255,255,255,0.75); font-weight: 800; letter-spacing: 0.06em; cursor: help; }
  .austen-name::after { content: "Named after Jane Austen. She had a rare gift for making complicated worlds feel clear, urgent, and readable. That is exactly what this digest tries to do for AI."; position: absolute; top: calc(100% + 8px); right: 0; background: #10131b; color: #f8f4e3; padding: 12px 16px; border-radius: 10px; font-size: 12px; font-weight: 400; line-height: 1.6; width: 260px; white-space: normal; opacity: 0; pointer-events: none; transition: opacity 0.2s; border: 1px solid #bf5631; box-shadow: 0 6px 24px rgba(16,19,27,0.5); z-index: 9999; text-transform: none; letter-spacing: 0; }
  .austen-name:hover::after { opacity: 1; }
  /* Ironbridge "iron is never one colour" gradient bar */
  .brand-bar { height: 4px; width: 100%; background: linear-gradient(90deg,#f8f4e3 0%,#e2b566 20%,#bf5631 45%,#c2ccd7 68%,#41407c 85%,#10131b 100%); }
  /* hairline divider */
  .hairline { height: 1px; background: #e6dcc4; border: none; margin: 0; }
  /* outlined pill tag */
  .pill { display: inline-block; font-family: 'Install Rounded', 'Nunito', Geist, Arial, sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #bf5631; border: 1px solid #bf5631; border-radius: 999px; padding: 4px 13px; }
  .pill-light { border-color: rgba(248,244,227,0.5); color: #ffffff; }
  /* eyebrow row: pill on the left, counter on the right */
  .eyebrow-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .eyebrow-count { font-family: 'Install Rounded', 'Nunito', Geist, Arial, sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #5f5a52; }
  /* bridge-arch bracket frame: cream [ ] with a semicircular arch, on hero sides */
  .bracket { position: relative; }
  .bracket::before, .bracket::after { content: ''; position: absolute; top: 50%; transform: translateY(-50%); height: 72px; width: 40px; pointer-events: none; background-repeat: no-repeat; background-position: center; background-size: 100% 100%; }
  .bracket::before { left: 18px; background-image: url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%20100%20200%27%20fill%3D%27%23f8f4e3%27%3E%3Cpath%20d%3D%27M0%2010%20A10%2010%200%200%201%2010%200%20L90%200%20A10%2010%200%200%201%20100%2010%20L100%2030%20A70%2070%200%200%200%20100%20170%20L100%20190%20A10%2010%200%200%201%2090%20200%20L10%20200%20A10%2010%200%200%201%200%20190%20Z%27/%3E%3C/svg%3E"); }
  .bracket::after { right: 18px; background-image: url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%20100%20200%27%20fill%3D%27%23f8f4e3%27%3E%3Cpath%20d%3D%27M100%2010%20A10%2010%200%200%200%2090%200%20L10%200%20A10%2010%200%200%200%200%2010%20L0%2030%20A70%2070%200%200%201%200%20170%20L0%20190%20A10%2010%200%200%200%2010%20200%20L90%20200%20A10%2010%200%200%200%20100%20190%20Z%27/%3E%3C/svg%3E"); }
  .workspace { display: flex; flex: 1; overflow: hidden; }
  .graph-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
  .toolbar { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #ffffff; border-bottom: 1px solid #e6dcc4; flex-shrink: 0; }
  .search-wrap { position: relative; flex: 1; max-width: 300px; }
  .search-wrap input { width: 100%; padding: 8px 12px 8px 32px; border: 1px solid #e6dcc4; border-radius: 20px; font-size: 13px; font-family: Geist, Arial, sans-serif; outline: none; color: #10131b; background: #f8f4e3; transition: border-color 0.15s; }
  .search-wrap input:focus { border-color: #bf5631; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; opacity: 0.5; pointer-events: none; }
  .legend-intro { font-size: 11px; color: #5f5a52; font-family: Geist, Arial, sans-serif; margin-right: 4px; align-self: center; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: flex-start; gap: 6px; cursor: pointer; transition: opacity 0.15s; }
  .legend-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; margin-top: 2px; }
  .legend-text { display: flex; flex-direction: column; line-height: 1.25; }
  .legend-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #10131b; font-family: 'Install Rounded', 'Nunito', Geist, Arial, sans-serif; }
  .legend-desc { font-size: 10px; color: #5f5a52; font-family: Geist, Arial, sans-serif; white-space: nowrap; }
  .trending-bar { font-size: 11px; color: #5f5a52; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .trending-bar span { font-family: 'Install Rounded', 'Nunito', Geist, Arial, sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #bf5631; }
  .trending-chip { display: inline-block; background: rgba(191,86,49,0.1); color: #10131b; border-radius: 12px; padding: 2px 9px; font-size: 11px; cursor: pointer; border: 1px solid rgba(191,86,49,0.3); }
  .trending-chip:hover { background: #bf5631; color: #ffffff; }
  #graph-svg { flex: 1; width: 100%; display: block; cursor: grab; }
  #graph-svg:active { cursor: grabbing; }
  .detail-col { width: 320px; flex-shrink: 0; border-left: 1px solid #e6dcc4; background: #ffffff; display: flex; flex-direction: column; overflow: hidden; }
  .detail-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; text-align: center; opacity: 0.5; }
  .detail-empty .hint-icon { font-size: 36px; margin-bottom: 12px; }
  .detail-empty p { font-size: 13px; color: #5f5a52; line-height: 1.6; }
  .detail-content { flex: 1; overflow-y: auto; padding: 28px 24px; display: none; }
  .detail-category { font-family: 'Install Rounded', 'Nunito', Geist, Arial, sans-serif; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; }
  .detail-term { font-family: 'Install Rounded', 'Nunito', Geist, Arial, sans-serif; font-size: 22px; font-weight: 800; color: #10131b; margin-bottom: 16px; line-height: 1.2; }
  .detail-def { font-size: 14px; line-height: 1.75; color: #10131b; margin-bottom: 24px; }
  .detail-section-label { font-family: 'Install Rounded', 'Nunito', Geist, Arial, sans-serif; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #bf5631; font-weight: 700; margin-bottom: 8px; border-top: 1px solid #e6dcc4; padding-top: 16px; }
  .related-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .related-chip { display: inline-block; background: #f8f4e3; border: 1px solid #e6dcc4; border-radius: 16px; padding: 4px 12px; font-size: 12px; font-family: 'Install Rounded', 'Nunito', Geist, Arial, sans-serif; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .related-chip:hover { border-color: #bf5631; background: rgba(191,86,49,0.1); }
  .bc-link { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: #f8f4e3; border: 1px solid #e6dcc4; border-radius: 8px; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: #10131b; font-family: 'Install Rounded', 'Nunito', Geist, Arial, sans-serif; transition: border-color 0.15s; }
  .bc-link:hover { border-color: #bf5631; }
  .bc-link-arrow { margin-left: auto; color: #bf5631; }
  .back-hub-btn { display: inline-flex; align-items: center; gap: 6px; background: transparent; border: 1px solid #e6dcc4; border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 700; font-family: 'Install Rounded', 'Nunito', Geist, Arial, sans-serif; color: #10131b; letter-spacing: 0.04em; transition: border-color 0.15s, background 0.15s; white-space: nowrap; flex-shrink: 0; }
  .back-hub-btn:hover { border-color: #bf5631; background: rgba(191,86,49,0.08); color: #bf5631; }
  .shuffle-btn { position: absolute; bottom: 20px; right: 20px; display: inline-flex; align-items: center; gap: 8px; background: #bf5631; color: #ffffff; border: none; border-radius: 24px; padding: 10px 20px; font-size: 13px; font-weight: 700; font-family: 'Install Rounded', 'Nunito', Geist, Arial, sans-serif; letter-spacing: 0.04em; cursor: pointer; box-shadow: 0 4px 16px rgba(191,86,49,0.35); transition: opacity 0.15s, transform 0.15s; z-index: 10; }
  .shuffle-btn:hover { opacity: 0.88; transform: scale(1.04); }
  .shuffle-btn:active { transform: scale(0.97); }
</style>
</head>

<script>
(function() {
  var NODES = [{"label": "LLM", "definition": "Large Language Model. An AI trained on vast amounts of text that can understand and generate human language. Think of it as an extremely well-read assistant that has absorbed billions of documents and can write, summarise, answer questions, and hold a conversation.", "category": "foundation", "from_log": false, "battlecards": [{"name": "OpenAI", "id": "openai"}, {"name": "xAI", "id": "xai"}, {"name": "Meta AI", "id": "meta"}]}, {"label": "Transformer", "definition": "The architecture that powers most modern AI models. Invented by Google in 2017, it lets AI process entire paragraphs at once and understand how words relate to each other, rather than reading one word at a time. It is the engine inside GPT, Claude, Gemini, and nearly every other AI you use today.", "category": "foundation", "from_log": false, "battlecards": []}, {"label": "Neural Network", "definition": "The basic building block of modern AI. Loosely inspired by the human brain, it is a layered system that learns patterns by adjusting millions of tiny connections based on examples. Train it on enough data and it learns to recognise faces, translate languages, or generate code.", "category": "foundation", "from_log": false, "battlecards": []}, {"label": "Context Window", "definition": "The maximum amount of text an AI can see and work with at one time. Think of it like the AI's short-term memory. A small context window limits the AI to a few pages; a large one can handle an entire book. Bigger context windows mean the AI can work on longer, more complex tasks.", "category": "deployment", "from_log": false, "battlecards": [{"name": "Anthropic", "id": "anthropic"}]}, {"label": "RAG", "definition": "Retrieval-Augmented Generation. A technique where an AI first searches a database of documents to find relevant information, then writes its answer based on what it found. This stops the AI from making things up and keeps answers grounded in your actual company data.", "category": "deployment", "from_log": false, "battlecards": [{"name": "Google / DeepMind", "id": "google"}]}, {"label": "Hallucination", "definition": "When an AI confidently states something that is factually wrong. Like a student who does not know the answer but writes something plausible-sounding anyway. Hallucination is one of the main risks of using AI output without human review.", "category": "safety", "from_log": false, "battlecards": []}, {"label": "RLHF", "definition": "Reinforcement Learning from Human Feedback. A training method where humans rate the AI's responses as good or bad, and the AI learns to produce more of what got positive ratings. This is how ChatGPT and Claude became helpful and conversational.", "category": "safety", "from_log": false, "battlecards": [{"name": "Anthropic", "id": "anthropic"}]}, {"label": "Multimodal", "definition": "An AI that can work with more than one type of input or output \u2014 text, images, audio, and video. A multimodal model can describe a photograph, read a chart, listen to a voice recording, or analyse a document without switching tools.", "category": "generation", "from_log": false, "battlecards": [{"name": "OpenAI", "id": "openai"}, {"name": "Google / DeepMind", "id": "google"}, {"name": "xAI", "id": "xai"}]}, {"label": "Agentic workflow", "definition": "A process where an AI takes a series of actions over time to complete a goal, rather than just answering a single question. An AI told to book a meeting might check calendars, draft an email, send it, and update a spreadsheet \u2014 all in sequence without human prompting at each step.", "category": "deployment", "from_log": false, "battlecards": [{"name": "OpenAI", "id": "openai"}, {"name": "Microsoft", "id": "microsoft"}]}, {"label": "Alignment", "definition": "The challenge of making AI systems do what humans actually want, safely and reliably. An aligned AI follows instructions without harmful side effects, respects rules, and does not pursue goals that conflict with human values. It is the difference between a helpful assistant and an unpredictable one.", "category": "safety", "from_log": false, "battlecards": [{"name": "Anthropic", "id": "anthropic"}]}, {"label": "Autoregressive model", "definition": "An AI that generates text one word at a time, where each word is predicted based on everything that came before it. This is how GPT models work. It is like autocomplete on your phone, but applied thousands of times in sequence at extraordinary speed.", "category": "generation", "from_log": false, "battlecards": [{"name": "OpenAI", "id": "openai"}]}, {"label": "Generative AI", "definition": "AI that creates brand-new content \u2014 text, images, audio, or code \u2014 rather than just sorting or analysing existing data. It is the category that ChatGPT, image generators, and coding assistants all belong to. The 'generative' part means it produces something that did not exist before.", "category": "generation", "from_log": false, "battlecards": []}, {"label": "Prompt", "definition": "The instruction or question you give an AI to tell it what you want. It is simply what you type into the box. The clearer and more specific your prompt, the better the answer you get back.", "category": "foundation", "from_log": false, "battlecards": []}, {"label": "Prompt engineering", "definition": "The skill of writing instructions that get the best results from an AI. Small changes in wording can dramatically change the output, so this has become a real craft. It is less about coding and more about clear, structured communication.", "category": "deployment", "from_log": false, "battlecards": []}, {"label": "Token", "definition": "The small chunk of text an AI reads and writes, roughly three-quarters of a word. AI does not see whole sentences; it breaks everything into tokens. The number of tokens decides how much you pay and how much the AI can handle at once.", "category": "foundation", "from_log": false, "battlecards": []}, {"label": "Fine-tuning", "definition": "Taking a general AI model and training it a little more on your own examples so it gets better at a specific job. Like hiring a capable graduate and then teaching them how your company does things. The result is a model that speaks your language and follows your patterns.", "category": "foundation", "from_log": false, "battlecards": []}, {"label": "Inference", "definition": "The moment an AI actually answers \u2014 when it takes your question and produces a response. Training is when the model learns; inference is when it works. Every answer you receive is an act of inference, and it is what costs money to run.", "category": "deployment", "from_log": false, "battlecards": []}, {"label": "Parameters", "definition": "The millions or billions of internal dials an AI adjusts as it learns. More parameters generally means the model can capture more complex patterns. When you hear a model is '70 billion parameters', that is a rough measure of its size and capability.", "category": "foundation", "from_log": false, "battlecards": []}, {"label": "Embedding", "definition": "A way of turning words, images, or documents into lists of numbers that capture their meaning, so a computer can compare them. Things with similar meaning end up with similar numbers. This is how AI knows that 'car' and 'vehicle' are related.", "category": "foundation", "from_log": false, "battlecards": []}, {"label": "Vector database", "definition": "A special kind of storage that holds those number-lists (embeddings) and finds the closest matches fast. It lets an AI search your documents by meaning rather than exact keywords. It is the engine behind most 'chat with your documents' tools.", "category": "deployment", "from_log": false, "battlecards": []}, {"label": "Temperature", "definition": "A setting that controls how creative or predictable an AI's output is. Low temperature makes it focused and repeatable; high temperature makes it more varied and surprising. Think of it as a dial between a careful accountant and a free-wheeling brainstormer.", "category": "generation", "from_log": false, "battlecards": []}, {"label": "System prompt", "definition": "Hidden instructions given to an AI before you ever type anything, setting its role, tone, and rules. It is the briefing the AI gets backstage. It is why one chatbot acts like a formal assistant and another like a playful friend.", "category": "deployment", "from_log": false, "battlecards": []}, {"label": "Chain-of-thought", "definition": "When an AI works through a problem step by step instead of jumping straight to an answer. Like showing your working in a maths exam, it makes the AI more accurate on hard problems. Many modern models reason this way before they reply.", "category": "generation", "from_log": false, "battlecards": []}, {"label": "Reasoning model", "definition": "A newer kind of AI built to think before it answers, spending extra time working through a problem step by step. It trades speed for accuracy, making it better at maths, coding, and logic. It is the difference between blurting an answer and pausing to reason.", "category": "foundation", "from_log": false, "battlecards": []}, {"label": "Guardrails", "definition": "The safety rules and filters built around an AI to stop it producing harmful, false, or off-limits content. Like the barriers on a mountain road, they keep the system from going where it should not. Good guardrails are what make AI safe to put in front of customers.", "category": "safety", "from_log": false, "battlecards": []}, {"label": "Few-shot learning", "definition": "Giving an AI a handful of examples inside your request so it understands the pattern you want. Show it three examples of the format you like, and it copies the style. It is teaching by demonstration, with no retraining needed.", "category": "foundation", "from_log": false, "battlecards": []}, {"label": "Knowledge cutoff", "definition": "The date after which an AI knows nothing, because its training data stopped there. Ask about events after the cutoff and it will not know unless it can search the web. It is why an AI sometimes seems frozen in the past.", "category": "safety", "from_log": false, "battlecards": []}, {"label": "AGI", "definition": "Artificial General Intelligence \u2014 a hypothetical AI that can do any intellectual task a human can, across every domain. Today's AI is narrow, brilliant at specific things; AGI would be broadly capable. It is the long-term goal that drives much of the industry.", "category": "foundation", "from_log": false, "battlecards": []}, {"label": "Mixture of Experts", "definition": "A model design that splits the work among many specialist sub-models and only wakes the ones it needs for each task. Like a hospital routing you to the right specialist instead of one doctor for everything. It makes very large models faster and cheaper to run.", "category": "foundation", "from_log": false, "battlecards": []}, {"label": "Distillation", "definition": "Training a small, fast AI to copy the behaviour of a large, expensive one. The big model is the teacher; the small model is the student that learns to give similar answers at a fraction of the cost. It is how powerful AI gets squeezed onto phones and laptops.", "category": "foundation", "from_log": false, "battlecards": []}, {"label": "Quantization", "definition": "Shrinking an AI model by storing its numbers with less precision, so it runs on smaller, cheaper hardware. Like compressing a photo: slightly less detail, far smaller size. It is what lets big models run on a laptop or phone.", "category": "deployment", "from_log": false, "battlecards": []}, {"label": "Bias", "definition": "When an AI systematically favours or disadvantages certain groups because of patterns in the data it learned from. If the training data was skewed, the AI inherits that skew. Spotting and reducing bias is central to using AI fairly.", "category": "safety", "from_log": false, "battlecards": []}, {"label": "AI agent", "definition": "A piece of AI software that can carry out multi-step tasks on its own without a human guiding every click. Unlike a chatbot that just answers questions, an agent can take actions: send emails, look up records, process refunds, or schedule meetings. Think of it as a digital employee that follows instructions and gets things done independently.", "category": "deployment", "from_log": true, "battlecards": [{"name": "Anthropic", "id": "anthropic"}]}, {"label": "Prompt injection", "definition": "A type of attack where someone hides instructions inside text that an AI reads, tricking it into doing something it was not supposed to do. Think of it like slipping a forged note into a stack of legitimate paperwork so the person processing it follows the fake instructions without realising.", "category": "safety", "from_log": true, "battlecards": [{"name": "Microsoft", "id": "microsoft"}]}, {"label": "Multi-agent interaction", "definition": "When multiple AI agents, each built by different companies or teams with different goals, communicate and transact with each other without a human in the middle. Imagine hundreds of personal assistants from different households all trying to book the same restaurant at once, each following their own boss's instructions but creating chaos together.", "category": "deployment", "from_log": true, "battlecards": []}, {"label": "Emergent behaviour", "definition": "When a system does something that nobody explicitly programmed it to do, simply because of how its individual parts interact. Like how a traffic jam appears even though no single driver decided to create one. In AI, it means agents or models producing unexpected results that arise from scale and complexity rather than design.", "category": "safety", "from_log": true, "battlecards": []}, {"label": "Frontier model", "definition": "The most advanced AI model available at any given time, pushing the boundary of what AI can do. It is the cutting edge, the model that defines the current limit of AI capability before the next breakthrough moves the line forward again.", "category": "foundation", "from_log": true, "battlecards": [{"name": "Anthropic", "id": "anthropic"}, {"name": "OpenAI", "id": "openai"}, {"name": "Google / DeepMind", "id": "google"}, {"name": "xAI", "id": "xai"}, {"name": "Meta AI", "id": "meta"}]}, {"label": "Multi-model architectures", "definition": "Instead of using one single AI brain for everything, a system uses different AI models for different tasks, like having a specialist doctor for complex problems and a GP for routine questions. This lets companies balance quality and cost by routing simple tasks to cheaper models and hard tasks to expensive ones.", "category": "business", "from_log": true, "battlecards": [{"name": "Microsoft", "id": "microsoft"}]}, {"label": "Diffusion-based generation", "definition": "A technique where AI creates output by starting with random noise and gradually refining it into a finished result, like a sculptor revealing a statue from a block of marble. Instead of building an answer one word at a time, the AI generates everything at once and sharpens it in a few quick passes. This makes output dramatically faster.", "category": "generation", "from_log": true, "battlecards": [{"name": "Google / DeepMind", "id": "google"}]}, {"label": "Search-grounding", "definition": "When an AI assistant looks through your actual files, emails, and documents to base its answers on real information rather than just its general training knowledge. It is what makes Copilot useful for work, because it answers questions about your specific data rather than giving generic responses.", "category": "deployment", "from_log": true, "battlecards": [{"name": "Microsoft", "id": "microsoft"}, {"name": "Google / DeepMind", "id": "google"}]}, {"label": "Open-weight model", "definition": "An AI model where the creator publishes the inner workings so anyone can download and run it on their own computers. Think of it like a recipe being made public: you can cook the dish yourself in your own kitchen instead of only buying it at the restaurant.", "category": "foundation", "from_log": true, "battlecards": [{"name": "xAI", "id": "xai"}, {"name": "Meta AI", "id": "meta"}]}, {"label": "AI agent governance", "definition": "The rules and monitoring a business puts in place to control what its AI agents are allowed to do on their own. It answers questions like: can this agent spend money, send emails, or share data without a human approving first? Think of it as setting boundaries for a new employee who works at superhuman speed.", "category": "business", "from_log": true, "battlecards": []}, {"label": "Computer use", "definition": "A capability that lets an AI take direct control of a computer \u2014 clicking buttons, typing into fields, opening files, and completing tasks inside real software \u2014 rather than just telling a human what to do. Think of it as giving the AI a pair of hands, not just a voice.", "category": "business", "from_log": true, "battlecards": []}, {"label": "Model cloning", "definition": "An attack where someone tries to copy an AI model's intelligence by asking it millions of questions and recording its answers, then using those answers to train a copycat AI \u2014 without ever paying to build the original. It is the AI equivalent of reverse-engineering a recipe by ordering the same dish thousands of times.", "category": "business", "from_log": true, "battlecards": []}];

    // Auto-connect isolated nodes — ensure every node has at least one edge
    var nodeDeg = new Array(simNodes.length).fill(0);
    simEdges.forEach(function(e) { nodeDeg[e.s]++; nodeDeg[e.t]++; });
    simNodes.forEach(function(n, i) {

      var bestJ = -1, bestDist = Infinity;

  var REPULSION = 7000, SPRING_LEN = 175, SPRING_K = 0.035;

        var dist = Math.sqrt(dx*dx + dy*dy) || 1;

        b.vx += fx; b.vy += fy;

    }
  }

  function loadTrendingLocal() {
    var arr = JSON.parse(localStorage.getItem('austen_searches') || '[]');
    var cutoff = Date.now() - 7 * 86400000;
    var counts = {};
    arr.filter(function(s) { return s.ts >= cutoff; }).forEach(function(s) {
      counts[s.term] = (counts[s.term] || 0) + 1;
    });
    var sorted = Object.entries(counts).sort(function(a,b) { return b[1]-a[1]; });
    if (sorted.length) display(sorted.slice(0,6).map(function(e) { return {term:e[0], count:e[1]}; }));
  }

  // URL param: focus a specific node on load
  var params = new URLSearchParams(window.location.search);
  var focusTerm = params.get('focus');

  resize();
  window.addEventListener('resize', function() { resize(); });
  initNodes();
  loadTrending();
  requestAnimationFrame(tick);

  if (focusTerm) {
    setTimeout(function() {
      var found = simNodes.find(function(n) {
        return n.data.label.toLowerCase() === focusTerm.toLowerCase();
      });
      if (found) showDetail(found.idx);
    }, 400);
  }

  document.getElementById('shuffle-btn').addEventListener('click', function() {
    var pool = simNodes.filter(function(n) { return nodeVisible(n) && n.idx !== activeIdx; });
    if (pool.length === 0) pool = simNodes.filter(function(n) { return n.idx !== activeIdx; });
    if (pool.length === 0) return;
    var pick = pool[Math.floor(Math.random() * pool.length)];
    showDetail(pick.idx);
  });
})();
</script>
</body>
</html>
